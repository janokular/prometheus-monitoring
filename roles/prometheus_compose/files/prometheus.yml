global:
  scrape_interval: 15s

scrape_configs:
  # server00 metrics
  - job_name: "server00_prometheus"
    static_configs:
      - targets: ["172.16.10.20:9090"]

  - job_name: "server00_node"
    static_configs:
      - targets: ["172.16.10.20:9100"]

  - job_name: "server00_docker"
    static_configs:
      - targets: ["172.16.10.20:9323"]

  # server01 metrics
  - job_name: "server01_node"
    static_configs:
      - targets: ["172.16.10.21:9100"]

  - job_name: "server01_docker"
    static_configs:
      - targets: ["172.16.10.21:9323"]

  # server02 metrics
  - job_name: "server02_node"
    static_configs:
      - targets: ["172.16.10.22:9100"]

  - job_name: "server02_docker"
    static_configs:
      - targets: ["172.16.10.22:9323"]
